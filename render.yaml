services:
  - type: web
    name: palmguard-python
    runtime: python
    region: frankfurt
    plan: starter
    buildCommand: apt-get install -y libgles2-mesa libgles2-mesa-dev && pip install -r requirements.txt && python -c "import ctypes; ctypes.CDLL('libGLESv2.so.2')" || true
    startCommand: bash -c "export LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH && gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000"
    healthCheckPath: /health
    # keepAlive not supported in Render YAML — use UptimeRobot or similar
    # to ping https://palmguard-python.onrender.com/ping every 5 min
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PORT
        value: "8000"
      - key: MEDIAPIPE_DISABLE_GPU
        value: "1"
      - key: DISPLAY
        value: ""
      - key: LIBGL_ALWAYS_SOFTWARE
        value: "1"
      - key: GALLIUM_DRIVER
        value: softpipe
      - key: EGL_PLATFORM
        value: surfaceless
      - key: LD_LIBRARY_PATH
        value: /usr/lib/x86_64-linux-gnu
